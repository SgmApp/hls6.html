<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>HLS Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
html,body{
margin:0;
padding:0;
width:100%;
height:100%;
background:#000;
overflow:hidden;
font-family:Arial;
}

#video{
width:100%;
height:100%;
background:#000;
}

#loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
color:#fff;
font-size:18px;
}

#controls{
position:absolute;
top:10px;
right:10px;
z-index:100;
}

button{
padding:10px 15px;
margin-left:5px;
border:none;
border-radius:5px;
background:#2196F3;
color:#fff;
font-size:15px;
}

button:active{
opacity:.7;
}
</style>

</head>

<body>

<div id="loading">Loading...</div>

<div id="controls">
<button onclick="reloadPlayer()">Reload</button>
<button onclick="goFullscreen()">Fullscreen</button>
</div>

<video
id="video"
controls
autoplay
playsinline
></video>

<script>

const params=new URLSearchParams(location.search);
const stream=params.get("x");

const video=document.getElementById("video");
const loading=document.getElementById("loading");

let hls=null;

function loadPlayer(){

loading.style.display="block";

if(hls){
hls.destroy();
}

if(Hls.isSupported()){

hls=new Hls({
enableWorker:true,
lowLatencyMode:true
});

hls.loadSource(stream);
hls.attachMedia(video);

hls.on(Hls.Events.MANIFEST_PARSED,function(){

loading.style.display="none";
video.play();

});

hls.on(Hls.Events.ERROR,function(event,data){

console.log(data);

});

}else if(video.canPlayType("application/vnd.apple.mpegurl")){

video.src=stream;

video.onloadedmetadata=function(){

loading.style.display="none";
video.play();

};

}

}

function reloadPlayer(){

loadPlayer();

}

function goFullscreen(){

if(video.requestFullscreen){

video.requestFullscreen();

}else if(video.webkitRequestFullscreen){

video.webkitRequestFullscreen();

}

}

if(stream){

loadPlayer();

}else{

loading.innerHTML="No Stream URL";

}

</script>

</body>
</html>
